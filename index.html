      --font-title:   'Cinzel Decorative', serif;
      --font-heading: 'Cinzel', serif;
      --font-body:    'Inter', sans-serif;
    }
    html, body { height: 100%; overflow-x: hidden; }

      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #A855F7; border-radius: 2px; }

    @keyframes pulse-glow { 0%,100%{opacity:.5}               50%{opacity:1} }
    @keyframes orb-spin   { from{transform:rotate(0deg)}       to{transform:rotate(360deg)} }
    @keyframes fadeUp     { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes ripple     { 0%{transform:scale(1);opacity:.5}  100%{transform:scale(2.4);opacity:0} }
    @keyframes starTwinkle{ 0%,100%{opacity:.1}                50%{opacity:.85} }
    @keyframes eyeBlink   { 0%,85%,100%{transform:scaleY(1)}   92%{transform:scaleY(.08)} }
    @keyframes slideIn    { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
    @keyframes confirmPop { 0%{transform:scale(.92);opacity:0} 100%{transform:scale(1);opacity:1} }
    @keyframes shine      { 0%{left:-100%} 100%{left:200%} }

    .panel {
      background: rgba(13,18,32,.9);
      border: 1px solid rgba(168,85,247,.22);
      border-radius: 20px;
      padding: 1.1rem;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0,0,0,.55), inset 0 1px 0 rgba(168,85,247,.1);
    }
    .match-pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: .65rem .85rem;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(0,0,0,.25);
      cursor: pointer;
      transition: all .2s ease;
      position: relative;
      overflow: hidden;
    }
    .match-pill.selected {
      border-color: rgba(168,85,247,.6);
      background: rgba(88,28,135,.22);
      box-shadow: 0 0 18px rgba(168,85,247,.2);
    }
    .match-pill.done {
      border-color: rgba(16,245,160,.25);
      background: rgba(5,95,69,.1);
      cursor: default;
    }
    .match-pill.consulting-pill {
      border-color: rgba(168,85,247,.8);
      animation: pulse-glow 1s ease-in-out infinite;
    }
    .match-pill:not(.done):not(.consulting-pill):hover {
      border-color: rgba(168,85,247,.4);
      background: rgba(88,28,135,.15);
    }

      width: 100%;
      padding: .9rem;
      border-radius: 14px;
      border: 1px solid rgba(168,85,247,.45);

      font-weight: 700;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;

      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      color: rgba(255,255,255,.22);
      cursor: not-allowed;
      box-shadow: none;
    }
    .score-gradient {
      background: linear-gradient(180deg,#10F5A0,#05B876);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .title-gradient {
      background: linear-gradient(135deg,#A855F7 0%,#7C3AED 40%,#10F5A0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    select {
      appearance: none;
      -webkit-appearance: none;
      background: rgba(168,85,247,.1);
      border: 1px solid rgba(168,85,247,.3);
      border-radius: 12px;
      padding: .55rem 2rem .55rem 1rem;
      color: #E9D5FF;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      width: 100%;
      outline: none;
    }
    /* Overlay de consulta */
    .oracle-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(8,11,20,.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: fadeUp .3s ease-out both;
    }
    /* Tarjeta de resultado expandida */
    .result-card {
      background: linear-gradient(135deg,#0D1520 0%,#0A1428 60%,#0D1520 100%);
      border: 1px solid rgba(16,245,160,.22);
      border-radius: 20px;
      padding: 1.25rem 1.1rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 40px rgba(0,0,0,.6), inset 0 1px 0 rgba(16,245,160,.08);
      animation: slideIn .45s ease-out both;
    }
    /* Badge de confirmación */
    .confirm-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: .35rem .85rem;
      border-radius: 20px;
      font-size: 11px; font-weight: 700;
      letter-spacing: .08em;
      cursor: pointer;
      transition: all .2s ease;
    }
    .confirm-badge.win  { background:rgba(16,245,160,.12); border:1px solid rgba(16,245,160,.4); color:#10F5A0; }
    .confirm-badge.loss { background:rgba(239,68,68,.1);   border:1px solid rgba(239,68,68,.35); color:#FCA5A5; }
    .confirm-badge.draw { background:rgba(168,85,247,.1);  border:1px solid rgba(168,85,247,.4); color:#D8B4FE; }
    .confirm-badge.confirmed-win  { background:rgba(16,245,160,.22); border-color:rgba(16,245,160,.7); }
    .confirm-badge.confirmed-loss { background:rgba(239,68,68,.2);   border-color:rgba(239,68,68,.6); }
    .confirm-badge.confirmed-draw { background:rgba(168,85,247,.22); border-color:rgba(168,85,247,.7); }

    /* Shimmer en btn al seleccionar */
    .btn-oracle.ready { position:relative; overflow:hidden; }
    .btn-oracle.ready::after {
      content:''; position:absolute; top:0; left:-100%;
      width:60%; height:100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
      animation: shine 2s ease-in-out infinite;
    }

function flagUrl(code) {
  var t = TEAMS[code];
  return 'https://flagcdn.com/w80/' + ((t && t.fc) ? t.fc : code.toLowerCase()) + '.png';
}
function tn(code) { return (TEAMS[code] && TEAMS[code].n) || code; }
function poissonSample(lambda) {
  var L=Math.exp(-lambda), k=0, p=1;
  do { k++; p*=Math.random(); } while(p>L);
  return Math.max(0,k-1);
}
function predict(homeName, awayName) {
  var eH=ELO[homeName]||1500, eA=ELO[awayName]||1500;
  var diff=eH-eA+50;
  var pH=1/(1+Math.pow(10,-diff/400)), pA=1-pH;
  var hG=poissonSample(1.25*pH/0.5), aG=poissonSample(1.25*pA/0.5);
  var conf=Math.min(97,Math.max(42,Math.round(50+(Math.abs(diff)/400)*40+(Math.random()*10-5))));
  var winner=hG>aG?homeName:aG>hG?awayName:'Empate';
  var cat=conf<55?'chaos':winner==='Empate'?'draw':'win';
  var pool=QUOTES[cat];
  return {
    score:hG+'-'+aG, hG:hG, aG:aG, winner:winner, confidence:conf,
    stars:Math.round(conf/20), probH:Math.round(pH*100), probA:Math.round(pA*100),
    quote:pool[Math.floor(Math.random()*pool.length)].replace('{w}',winner)
  };
}

        ].map(function(t,i){return(
          <g key={i}>
            <path d={t[0]} stroke="#5B21B6" strokeWidth="12" fill="none" strokeLinecap="round" style={{animation:t[1]}}/>
            <path d={t[0]} stroke="#8B5CF6" strokeWidth="5"  fill="none" strokeLinecap="round" opacity=".55"/>
          </g>
        );})}
        {/* Ventosas */}
        {[[48,166],[40,188],[70,183],[64,205],[100,173],[100,198],[130,183],[136,205],[152,166],[160,188]].map(function(p,i){
          return <circle key={i} cx={p[0]} cy={p[1]} r="3.5" fill="#1A0A3E" stroke="#A855F7" strokeWidth="1" opacity=".72"/>;
        })}
        {/* Cuerpo */}
        <ellipse cx="100" cy="80" rx="56" ry="63" fill="url(#bG)" stroke="#7C3AED" strokeWidth="1.5"/>
        <ellipse cx="100" cy="58" rx="38" ry="27" fill="url(#sG)"/>
        <circle cx="80"  cy="70" r="13" fill="#4C1D95" opacity=".28"/>
        <circle cx="120" cy="72" r="11" fill="#312E81" opacity=".22"/>
        <circle cx="100" cy="108" r="20" fill="#1E1B4B" opacity=".28"/>
        {[[83,114,4],[110,119,3.5],[95,127,5]].map(function(s,i){
          return <circle key={i} cx={s[0]} cy={s[1]} r={s[2]} fill="none" stroke="#6D28D9" strokeWidth=".8" opacity=".3"/>;
        })}
        {/* Ojos */}
        {[[78,86],[122,86]].map(function(e,i){
          return(
            <g key={i}>
              <ellipse cx={e[0]} cy={e[1]} rx="14" ry="14" fill={i===0?"url(#eHL)":"url(#eHR)"}/>
              <g style={{animation:'eyeBlink 4s ease-in-out '+(i===0?'0s':'.5s')+' infinite'}}>
                <ellipse cx={e[0]} cy={e[1]} rx="11" ry="11" fill={ef} stroke={es} strokeWidth="1.5"/>
                <ellipse cx={e[0]} cy={e[1]} rx="7"  ry="7"  fill={active?'#059669':'#4C1D95'}/>
                <ellipse cx={e[0]} cy={e[1]} rx="4"  ry="4"  fill={ec}/>
                <circle  cx={e[0]-4} cy={e[1]-4} r="2.2" fill="white" opacity=".9"/>
              </g>
            </g>
          );
        })}
        {/* Boca */}
        <path d="M90,112 Q100,120 110,112" stroke={active?'#10F5A0':'#8B5CF6'} strokeWidth="2" fill="none" strokeLinecap="round" opacity=".7"/>
        {/* Corona */}
        {active && [0,60,120,180,240,300].map(function(angle,i){
          var r=angle*Math.PI/180;
          return(<circle key={i} cx={100+52*Math.cos(r)} cy={33+18*Math.sin(r)} r="2"
            fill={i%2===0?'#A855F7':'#10F5A0'}
            style={{animation:'starTwinkle '+(1.2+i*.3)+'s ease-in-out '+(i*.2)+'s infinite'}}/>);
        })}
      </svg>
    </div>
  );
}

/* ══════════════════════════════════════════
   OVERLAY DE CONSULTA (pantalla completa durante el trance)
══════════════════════════════════════════ */
function OracleOverlay(props) {
  var tranceMsg=props.tranceMsg, match=props.match;
  return (
    <div className="oracle-overlay">
      <div style={{textAlign:'center',padding:'0 1.5rem'}}>
        <p style={{fontSize:'10px',letterSpacing:'.25em',color:'rgba(168,85,247,.65)',
          textTransform:'uppercase',marginBottom:'.5rem',fontFamily:'var(--font-body)'}}>
          Consultando al Oráculo
        </p>
        <p style={{fontFamily:'var(--font-heading)',fontSize:'1rem',fontWeight:700,
          color:'rgba(255,255,255,.85)',marginBottom:'.25rem'}}>
          {match.home} vs {match.away}
        </p>
      </div>
      <OctopusSVG phase="trance"/>
      <p style={{fontSize:'11px',fontFamily:'monospace',color:'rgba(168,85,247,.85)',letterSpacing:'.05em',textAlign:'center'}}>
        ⬡ {tranceMsg}
      </p>
    </div>
  );
}

/* ══════════════════════════════════════════
   TARJETA DE RESULTADO (partido con pronóstico)
══════════════════════════════════════════ */
function ResultCard(props) {
  var match=props.match, pred=props.pred, onConfirm=props.onConfirm;
  var isHome=pred.winner===match.home, isAway=pred.winner===match.away;

  /* resultado real confirmado */
  var confirmed=pred.confirmed; /* null | 'win' | 'loss' | 'draw' */
  var confirmLabel = confirmed==='win'  ? '✓ Acertado'   :
                     confirmed==='loss' ? '✗ Falló'       :
                     confirmed==='draw' ? '~ Empate real' : null;

  return (
    <div className="result-card">
      {/* Línea top */}
      <div style={{position:'absolute',top:0,left:'8%',right:'8%',height:'1px',
        background:'linear-gradient(90deg,transparent,rgba(16,245,160,.55),transparent)'}}/>

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.75rem'}}>
        <span style={{fontSize:'9px',letterSpacing:'.12em',color:'rgba(168,85,247,.7)',fontWeight:600}}>
          GRUPO {match.group} · {match.date}
        </span>
        {confirmed ? (
          <span className={'confirm-badge confirmed-'+confirmed} style={{fontSize:'9px'}}>
            {confirmLabel}
          </span>
        ) : (
          <span style={{fontSize:'9px',color:'rgba(16,245,160,.55)',letterSpacing:'.1em'}}>🔮 SELLADO</span>
        )}
      </div>

      {/* Equipos + score */}
      <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'.8rem'}}>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}>
          <img src={flagUrl(match.homeCode)} alt={match.home}
            style={{width:'40px',height:'28px',objectFit:'cover',borderRadius:'5px',
              border:isHome?'1.5px solid rgba(16,245,160,.8)':'1px solid rgba(255,255,255,.1)',
              boxShadow:isHome?'0 0 10px rgba(16,245,160,.4)':'none'}}
            onError={function(e){e.target.style.display='none';}}/>
          <span style={{fontSize:'11px',fontWeight:600,color:isHome?'#10F5A0':'#C4C9E0',
            textAlign:'center',maxWidth:'68px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>
            {match.home}
          </span>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',minWidth:'68px'}}>
          <span className="score-gradient" style={{fontSize:'26px',fontWeight:800,letterSpacing:'2px',lineHeight:1}}>
            {pred.score}
          </span>
          {pred.winner==='Empate'
            ? <span style={{fontSize:'9px',color:'rgba(168,85,247,.85)',background:'rgba(168,85,247,.1)',
                border:'1px solid rgba(168,85,247,.25)',borderRadius:'4px',padding:'1px 5px',fontWeight:600}}>EMPATE</span>
            : <span style={{fontSize:'9px',color:'rgba(16,245,160,.6)',letterSpacing:'.1em'}}>marcador</span>
          }
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}>
          <img src={flagUrl(match.awayCode)} alt={match.away}
            style={{width:'40px',height:'28px',objectFit:'cover',borderRadius:'5px',
              border:isAway?'1.5px solid rgba(16,245,160,.8)':'1px solid rgba(255,255,255,.1)',
              boxShadow:isAway?'0 0 10px rgba(16,245,160,.4)':'none'}}
            onError={function(e){e.target.style.display='none';}}/>
          <span style={{fontSize:'11px',fontWeight:600,color:isAway?'#10F5A0':'#C4C9E0',
            textAlign:'center',maxWidth:'68px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>
            {match.away}
          </span>
        </div>
      </div>

      {/* Barra de probabilidad */}
      <div style={{marginBottom:'.7rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'3px'}}>
          <span style={{fontSize:'10px',color:'rgba(16,245,160,.85)',fontWeight:700}}>{pred.probH}%</span>
          <span style={{fontSize:'10px',color:'rgba(255,255,255,.25)'}}>probabilidad</span>
          <span style={{fontSize:'10px',color:'rgba(168,85,247,.85)',fontWeight:700}}>{pred.probA}%</span>
        </div>
        <div style={{height:'4px',background:'rgba(255,255,255,.06)',borderRadius:'2px',overflow:'hidden'}}>
          <div style={{height:'100%',width:pred.probH+'%',borderRadius:'2px',
            background:'linear-gradient(90deg,rgba(16,245,160,.85),rgba(56,189,248,.6))'}}/>
        </div>
      </div>

      {/* Confianza */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
        background:'rgba(0,0,0,.25)',borderRadius:'10px',padding:'.4rem .7rem',
        border:'1px solid rgba(255,255,255,.04)',marginBottom:'.65rem'}}>
        <div style={{display:'flex',gap:'3px'}}>
          {[0,1,2,3,4].map(function(i){
            return <span key={i} style={{fontSize:'12px',opacity:i<pred.stars?1:.18,
              filter:i<pred.stars?'drop-shadow(0 0 4px rgba(16,245,160,.8))':'none'}}>✦</span>;
          })}
        </div>
        <span style={{fontSize:'11px',fontWeight:700,
          color:pred.confidence>=75?'#10F5A0':pred.confidence>=60?'#A855F7':'#F59E0B'}}>
          {pred.confidence}% confianza
        </span>
      </div>

      {/* Frase */}
      <div style={{borderLeft:'2px solid rgba(168,85,247,.4)',paddingLeft:'.65rem',marginBottom:'.85rem'}}>
        <p style={{fontSize:'11px',color:'rgba(196,201,224,.85)',fontStyle:'italic',lineHeight:1.55,margin:0}}>
          "{pred.quote}"
        </p>
      </div>

      {/* Botones de confirmación (solo si no confirmado) */}
      {!confirmed && (
        <div>
          <p style={{fontSize:'10px',color:'rgba(255,255,255,.3)',textAlign:'center',marginBottom:'.5rem',letterSpacing:'.08em'}}>
            ¿YA JUGARON? CONFIRMA EL RESULTADO REAL
          </p>
          <div style={{display:'flex',gap:'6px',justifyContent:'center',flexWrap:'wrap'}}>
            <button className="confirm-badge win"  onClick={function(){onConfirm('win');}}>✓ Acertó el Oráculo</button>
            <button className="confirm-badge draw" onClick={function(){onConfirm('draw');}}>~ Empate real</button>
            <button className="confirm-badge loss" onClick={function(){onConfirm('loss');}}>✗ Falló el Oráculo</button>
          </div>
        </div>
      )}

      {/* Línea bottom */}
      <div style={{position:'absolute',bottom:0,left:'8%',right:'8%',height:'1px',
        background:'linear-gradient(90deg,transparent,rgba(168,85,247,.3),transparent)'}}/>
    </div>
  );
}

/* ══════════════════════════════════════════
   APP
══════════════════════════════════════════ */
function App() {
  var useState    = React.useState;
  var useEffect   = React.useEffect;
  var useMemo     = React.useMemo;
  var useCallback = React.useCallback;

  /* Estado persistente de predicciones: { [matchId]: {score,winner,...,confirmed} } */
  var predsState = useState(loadPreds);
  var preds = predsState[0]; var setPreds = predsState[1];

  var dateState = useState('16 Jun 2026');
  var date = dateState[0]; var setDate = dateState[1];

  /* Partido seleccionado para consultar */
  var selectedState = useState(null);
  var selectedId = selectedState[0]; var setSelectedId = selectedState[1];

  /* Estado de consulta: idle | consulting | trance */
  var phaseState = useState('idle');
  var phase = phaseState[0]; var setPhase = phaseState[1];

  var tranceState = useState(0);
  var tranceIdx = tranceState[0]; var setTrancIdx = tranceState[1];

  /* Partidos del día seleccionado */
  var matches = useMemo(function(){
    return MATCHUPS
      .filter(function(m){ return m.d===date; })
      .map(function(m,i){
        return { id:makeId(m,i), home:tn(m.h), away:tn(m.a), homeCode:m.h, awayCode:m.a, group:m.g, date:m.d };
      });
  },[date]);

  /* Partido actualmente seleccionado */
  var selectedMatch = useMemo(function(){
    return matches.find(function(m){ return m.id===selectedId; }) || null;
  },[matches, selectedId]);

  /* Trance ticker */
  useEffect(function(){
    if(phase!=='trance') return;
    var t=setInterval(function(){ setTrancIdx(function(p){ return (p+1)%TRANCE.length; }); },1400);
    return function(){ clearInterval(t); };
  },[phase]);

  /* Persistir cambios */
  useEffect(function(){ savePreds(preds); },[preds]);

  /* Seleccionar partido (solo si no tiene pronóstico) */
  var handleSelect = function(matchId){
    if(preds[matchId]) return; /* ya tiene pronóstico: no hacer nada */
    if(phase!=='idle') return;
    setSelectedId(function(prev){ return prev===matchId?null:matchId; });
  };

  /* Ejecutar consulta */
  var handleConsult = useCallback(function(){
    if(!selectedMatch) return;
    if(preds[selectedMatch.id]) return;
    if(phase!=='idle') return;

    setPhase('consulting');
    setTimeout(function(){ setPhase('trance'); }, 500);

    /* Cálculo inmediato, mostrar tras animación */
    var result = predict(selectedMatch.home, selectedMatch.away);
    setTimeout(function(){
      setPreds(function(prev){
        var next = Object.assign({}, prev);
        next[selectedMatch.id] = Object.assign({}, result, { confirmed: null });
        return next;
      });
      setPhase('idle');
      setSelectedId(null);
    }, 3800);
  },[selectedMatch, preds, phase]);

  /* Confirmar resultado real */
  var handleConfirm = function(matchId, verdict){
    setPreds(function(prev){
      var next = Object.assign({}, prev);
      if(next[matchId]) next[matchId] = Object.assign({}, next[matchId], { confirmed: verdict });
      return next;
    });
  };

  /* Separar partidos en: con pronóstico vs sin pronóstico */
  var matchesWithPred    = matches.filter(function(m){ return !!preds[m.id]; });
  var matchesWithoutPred = matches.filter(function(m){ return !preds[m.id]; });

  var busy = phase==='consulting'||phase==='trance';
  var canConsult = selectedId && !preds[selectedId] && !busy;

  /* Estrellas de fondo */
  var stars = useMemo(function(){
    return Array.from({length:35},function(){
      return {x:Math.random()*100,y:Math.random()*100,r:.5+Math.random()*1.5,d:2+Math.random()*4,delay:Math.random()*3};
    });
  },[]);

  return (
    <div style={{minHeight:'100vh',background:'var(--bg-deep)',position:'relative',overflowX:'hidden',paddingBottom:'3rem'}}>

      {/* Estrellas */}
      <svg style={{position:'fixed',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}} aria-hidden="true">
        {stars.map(function(s,i){
          return <circle key={i} cx={s.x+'%'} cy={s.y+'%'} r={s.r} fill="white"
            style={{animation:'starTwinkle '+s.d+'s ease-in-out '+s.delay+'s infinite'}}/>;
        })}
      </svg>
      <div style={{position:'fixed',top:'-20%',left:'-20%',width:'60%',height:'60%',
        borderRadius:'50%',background:'radial-gradient(circle,rgba(88,28,135,.18) 0%,transparent 70%)',
        pointerEvents:'none',zIndex:0,animation:'pulse-glow 6s ease-in-out infinite'}}/>
      <div style={{position:'fixed',bottom:'-15%',right:'-15%',width:'55%',height:'55%',
        borderRadius:'50%',background:'radial-gradient(circle,rgba(5,150,105,.12) 0%,transparent 70%)',
        pointerEvents:'none',zIndex:0,animation:'pulse-glow 8s ease-in-out 2s infinite'}}/>

      {/* Overlay de consulta (pantalla completa) */}
      {busy && selectedMatch && (
        <OracleOverlay tranceMsg={TRANCE[tranceIdx]} match={selectedMatch}/>
      )}

      <div style={{maxWidth:'430px',margin:'0 auto',padding:'0 1rem',position:'relative',zIndex:1}}>

        {/* HEADER */}
        <header style={{textAlign:'center',paddingTop:'1.8rem',paddingBottom:'.5rem'}}>
          <div style={{fontSize:'10px',letterSpacing:'.28em',color:'rgba(168,85,247,.65)',fontWeight:600,marginBottom:'.4rem',textTransform:'uppercase'}}>
            FIFA World Cup 2026 · Predictor
          </div>
          <h1 className="title-gradient" style={{fontFamily:'var(--font-title)',
            fontSize:'clamp(1.3rem,6vw,1.75rem)',fontWeight:900,lineHeight:1.12,marginBottom:'.3rem'}}>
            El Oráculo<br/>del Pulpo
          </h1>
          <p style={{fontSize:'11px',color:'rgba(196,201,224,.4)',fontStyle:'italic'}}>
            "Selecciona un partido para invocar la visión"
          </p>
        </header>

        {/* PULPO (visible solo cuando no hay overlay) */}
        {!busy && (
          <section style={{padding:'1rem 0 .5rem'}}>
            <OctopusSVG phase={selectedId&&!preds[selectedId]?'active':'idle'}/>
          </section>
        )}

        {/* PANEL PRINCIPAL */}
        <section className="panel" style={{marginBottom:'1.25rem'}}>

          {/* Selector de fecha */}
          <div style={{marginBottom:'.9rem'}}>
            <label style={{display:'block',fontSize:'10px',fontWeight:600,letterSpacing:'.12em',
              color:'rgba(168,85,247,.65)',textTransform:'uppercase',marginBottom:'.4rem'}}>
              Fecha
            </label>
            <div style={{position:'relative'}}>
              <select value={date} onChange={function(e){
                setDate(e.target.value); setSelectedId(null); setPhase('idle');
              }}>
                {DATES.map(function(d){ return <option key={d} value={d}>{d}</option>; })}
              </select>
              <span style={{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',
                color:'rgba(168,85,247,.6)',pointerEvents:'none',fontSize:'11px'}}>▼</span>
            </div>
          </div>

          {/* Lista de partidos SIN pronóstico */}
          {matchesWithoutPred.length > 0 && (
            <div style={{marginBottom:'.9rem'}}>
              <p style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',
                color:'rgba(255,255,255,.25)',marginBottom:'.5rem',textTransform:'uppercase'}}>
                Selecciona un partido
              </p>
              <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                {matchesWithoutPred.map(function(m){
                  var isSel = selectedId===m.id;
                  return (
                    <div key={m.id}
                      className={'match-pill'+(isSel?' selected':'')}
                      onClick={function(){ handleSelect(m.id); }}>
                      {/* Efecto shine al seleccionar */}
                      {isSel && <div style={{position:'absolute',inset:0,borderRadius:'14px',overflow:'hidden',pointerEvents:'none'}}>
                        <div style={{position:'absolute',top:0,left:'-100%',width:'60%',height:'100%',
                          background:'linear-gradient(90deg,transparent,rgba(168,85,247,.15),transparent)',
                          animation:'shine 1.8s ease-in-out infinite'}}/>
                      </div>}

                      <div style={{display:'flex',alignItems:'center',gap:'6px',flex:1}}>
                        <img src={flagUrl(m.homeCode)} alt={m.home}
                          style={{width:'26px',height:'18px',objectFit:'cover',borderRadius:'3px',flexShrink:0}}
                          onError={function(e){e.target.style.display='none';}}/>
                        <span style={{fontSize:'12px',fontWeight:600,color:'#E9D5FF',
                          overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',maxWidth:'70px'}}>
                          {m.home}
                        </span>
                        <span style={{fontSize:'10px',color:'rgba(255,255,255,.3)',fontWeight:700,flexShrink:0}}>vs</span>
                        <img src={flagUrl(m.awayCode)} alt={m.away}
                          style={{width:'26px',height:'18px',objectFit:'cover',borderRadius:'3px',flexShrink:0}}
                          onError={function(e){e.target.style.display='none';}}/>
                        <span style={{fontSize:'12px',fontWeight:600,color:'#E9D5FF',
                          overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',maxWidth:'70px'}}>
                          {m.away}
                        </span>
                      </div>

                      <div style={{display:'flex',alignItems:'center',gap:'4px',flexShrink:0}}>
                        <span style={{fontSize:'9px',color:'rgba(168,85,247,.6)',
                          background:'rgba(168,85,247,.08)',border:'1px solid rgba(168,85,247,.2)',
                          borderRadius:'5px',padding:'1px 5px',fontWeight:600}}>G·{m.group}</span>
                        {isSel
                          ? <span style={{fontSize:'14px'}}>🔮</span>
                          : <span style={{fontSize:'11px',color:'rgba(255,255,255,.2)'}}>›</span>
                        }
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Botón consultar */}
          <button className={'btn-oracle'+(canConsult?' ready':'')}
            onClick={handleConsult}
            disabled={!canConsult}>
            {busy
              ? <><span style={{display:'inline-block',animation:'orb-spin 1.2s linear infinite',fontSize:'16px'}}>◌</span><span>El Oráculo consulta...</span></>
              : selectedId && !preds[selectedId]
                ? <><span>🔮</span><span>Invocar la Visión</span></>
                : <><span>🌊</span><span>Selecciona un partido</span></>
            }
          </button>
        </section>

        {/* PRONÓSTICOS GENERADOS */}
        {matchesWithPred.length > 0 && (
          <section>
            <div style={{textAlign:'center',marginBottom:'1rem'}}>
              <p style={{fontFamily:'var(--font-heading)',fontSize:'1rem',fontWeight:700,
                background:'linear-gradient(135deg,#A855F7,#10F5A0)',
                WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>
                Visiones del Oráculo
              </p>
              <div style={{height:'1px',width:'70px',margin:'4px auto 0',
                background:'linear-gradient(90deg,transparent,rgba(16,245,160,.5),transparent)'}}/>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
              {matchesWithPred.map(function(m){
                return (
                  <ResultCard key={m.id} match={m} pred={preds[m.id]}
                    onConfirm={function(verdict){ handleConfirm(m.id, verdict); }}/>
                );
              })}
            </div>
          </section>
        )}

        {/* Mensaje si no hay partidos */}
        {matches.length===0 && (
          <div style={{textAlign:'center',padding:'2rem 1rem',color:'rgba(255,255,255,.25)',fontSize:'13px'}}>
            No hay partidos registrados en esta fecha.
          </div>
        )}

        <footer style={{textAlign:'center',paddingTop:'2rem'}}>
          <p style={{fontSize:'9px',letterSpacing:'.2em',color:'rgba(255,255,255,.1)',textTransform:'uppercase'}}>
            Oráculo del Pulpo · Mundial 2026 · Solo entretenimiento
          </p>
        </footer>
      </div>
    </div>
  );
}

var container = document.getElementById('root');
var reactRoot = ReactDOM.createRoot(container);
reactRoot.render(React.createElement(App, null));
</script>

<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',function(){
      navigator.serviceWorker.register('./sw.js')
        .then(function(r){console.log('SW OK:',r.scope);})
        .catch(function(e){console.warn('SW error:',e);});
    });
  }
</script>
